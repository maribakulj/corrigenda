name: Publish alto-core

# Manual-only: a release is a deliberate act, not a side-effect of a
# merge. The repo maintainer triggers this from the GitHub UI
# (Actions → Publish alto-core → Run workflow) after bumping the
# version in src/alto_core/__init__.py and updating CHANGELOG.md.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

# Trusted Publishing (PEP 740 / OIDC) needs `id-token: write`. No
# long-lived PyPI token is stored as a GitHub secret — the workflow
# exchanges its OIDC token for a short-lived PyPI credential at
# upload time.
permissions:
  contents: read
  id-token: write

# Serialise publish runs. Two operators dispatching the workflow at
# the same time would both build, both attempt OIDC exchange, and
# either (a) collide on the version (PyPI rejects a duplicate upload)
# or (b) waste an OIDC slot. `cancel-in-progress: false` because a
# publish must NOT be cancelled mid-flight — once the wheel is built
# and partially uploaded, we want the run to finish or fail cleanly.
concurrency:
  group: publish-alto-core-${{ github.event.inputs.target }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/alto-core
    # Map the dispatch input to an Environment so PyPI/TestPyPI rules
    # (required reviewers, branch protection) can be configured per
    # target without touching this file.
    environment:
      name: ${{ inputs.target }}
      url: ${{ inputs.target == 'pypi' && 'https://pypi.org/project/alto-core/' || 'https://test.pypi.org/project/alto-core/' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Roadmap L7 / P6 — we verify HEAD is on a release tag below,
          # which needs the tag refs in the local clone. Default depth=1
          # would strip them and the check would always pass vacuously.
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Verify HEAD is on an alto-core release tag
        # Roadmap L7 / P6 — a release is a deliberate act anchored on a
        # git tag. The workflow_dispatch trigger lets anyone with write
        # access pick any branch SHA; without this guard, a maintainer
        # could accidentally publish whatever the default branch points
        # at. We require an `alto-core-vX.Y.Z` tag pointing at HEAD,
        # where X.Y.Z matches `alto_core.__version__` exactly.
        run: |
          VERSION=$(python -c "
          import re, pathlib
          init = pathlib.Path('src/alto_core/__init__.py').read_text()
          # Optional `(?::\s*[^=]+)?` clause matches both
          #   __version__ = \"X.Y.Z\"
          # and a future type-annotated form
          #   __version__: Final[str] = \"X.Y.Z\"
          # which would otherwise return None and abort the publish.
          m = re.search(r\"__version__\\s*(?::\\s*[^=]+)?=\\s*['\\\"]([^'\\\"]+)['\\\"]\", init)
          if not m:
              raise SystemExit('__version__ not found in src/alto_core/__init__.py')
          print(m.group(1))
          ")
          EXPECTED_TAG="alto-core-v${VERSION}"
          if ! git rev-parse --verify "refs/tags/${EXPECTED_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag '${EXPECTED_TAG}' does not exist in this clone. Create and push it with: git tag ${EXPECTED_TAG} && git push origin ${EXPECTED_TAG}"
            exit 1
          fi
          HEAD_SHA=$(git rev-parse HEAD)
          TAG_SHA=$(git rev-parse "${EXPECTED_TAG}^{commit}")
          if [[ "${HEAD_SHA}" != "${TAG_SHA}" ]]; then
            echo "::error::HEAD (${HEAD_SHA}) is not at tag '${EXPECTED_TAG}' (${TAG_SHA}). Move the tag to the commit being published, or re-run the workflow on the tagged commit."
            exit 1
          fi
          echo "Release tag ${EXPECTED_TAG} confirmed at HEAD."

      - name: Install build tooling
        run: pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Smoke-install the wheel
        # Catch packaging regressions before they reach the index.
        # _smoke_imports.py is shared with the CI build job and
        # scripts/release-alto-core.sh — see roadmap L5 / B6.
        run: |
          python -m venv /tmp/wheel-smoke
          /tmp/wheel-smoke/bin/pip install dist/*.whl
          /tmp/wheel-smoke/bin/python _smoke_imports.py

      - name: Publish to TestPyPI (Trusted Publishing OIDC)
        if: inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: packages/alto-core/dist/

      - name: Publish to PyPI (Trusted Publishing OIDC)
        if: inputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/alto-core/dist/

      - name: Upload distribution artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alto-core-dist-${{ inputs.target }}
          path: packages/alto-core/dist/
          if-no-files-found: error
