name: Sync to HF Spaces
on:
  push:
    branches: [main]

# Minimum-required permissions for this workflow. The actual mirror
# happens via a separate HF_TOKEN secret; the workflow only needs to
# READ the repository contents to push them elsewhere. Without an
# explicit block, GitHub falls back to the repo-level default
# (potentially `contents: write`), giving this workflow more power
# than it uses (L10/R4).
permissions:
  contents: read

# Serialise concurrent runs: two PRs merging in quick succession would
# both try to force-push to the same HF Space. Whichever finishes
# second wins and the first push's commit metadata vanishes upstream.
# `cancel-in-progress: false` lets the first run complete so the
# second sees a clean state (rather than a half-pushed mirror).
concurrency:
  group: hf-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        # HF Space is a downstream mirror — --force is intentional to
        # overwrite any auto-commits made by HF infrastructure.
        # The token is provided via a git credential helper that reads
        # from env vars, so it never appears in the remote URL (which
        # would leak in `git` error output and process listings).
        run: |
          set -eu
          : "${HF_USERNAME:?missing secret HF_USERNAME}"
          : "${HF_TOKEN:?missing secret HF_TOKEN}"
          : "${HF_SPACE_NAME:?missing secret HF_SPACE_NAME}"

          git remote add hf "https://huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME"
          git config --local credential.helper \
            '!f() { echo "username=${HF_USERNAME}"; echo "password=${HF_TOKEN}"; }; f'
          git push hf main --force
