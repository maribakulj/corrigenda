name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal default permissions for every job. Override per-job only if a
# step needs to write (none today).
permissions:
  contents: read

# Cancel in-flight CI when a newer commit is pushed to the same ref.
# Saves CI minutes; the only thing that matters is the latest state.
# Per-ref grouping keeps PRs and pushes to other branches independent.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  corrigenda-lint:
    runs-on: ubuntu-latest
    # Wave-5 review — no job may idle toward the 6 h default.
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/corrigenda
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.15.14
      - name: ruff check
        # Wave-5 review — tests/ was only covered by pre-commit; a
        # contributor without it could merge unlinted test code.
        run: ruff check src/ tests/
      - name: ruff format --check
        run: ruff format --check src/ tests/
      - name: Version coherence (__init__.py ↔ CHANGELOG.md)
        # Roadmap L7 / P5 — bumping `__version__` without a matching
        # CHANGELOG entry was caught only at release-script time
        # (scripts/release-corrigenda.sh:55-59); now CI blocks the
        # commit. The check accepts both `## [X.Y.Z]` and
        # `## [X.Y.Z] — date` heading shapes already used in the file.
        # The regex's optional `(?::\s*[^=]+)?` clause tolerates a future
        # type annotation (e.g. `__version__: Final[str] = "..."`); without
        # it, adding a type hint would silently strand CI on the prior
        # branch where it could not find a match.
        run: |
          VERSION=$(python -c "
          import re, pathlib
          init = pathlib.Path('src/corrigenda/__init__.py').read_text()
          m = re.search(r\"__version__\\s*(?::\\s*[^=]+)?=\\s*['\\\"]([^'\\\"]+)['\\\"]\", init)
          if not m:
              raise SystemExit('__version__ not found in src/corrigenda/__init__.py')
          print(m.group(1))
          ")
          echo "Detected __version__: ${VERSION}"
          if ! grep -E "^## \\[${VERSION}\\]" CHANGELOG.md > /dev/null; then
            echo "::error file=CHANGELOG.md::__version__ is '${VERSION}' but CHANGELOG.md has no '## [${VERSION}]' heading. Bump the changelog before merging."
            exit 1
          fi
          echo "Version coherence OK: __init__.py == CHANGELOG.md == ${VERSION}"

  corrigenda-types:
    # F12 / §8.3 — the package ships py.typed and must pass mypy --strict.
    runs-on: ubuntu-latest
    # Wave-5 review — no job may idle toward the 6 h default.
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/corrigenda
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install corrigenda (editable) + mypy + stubs
        run: |
          pip install -e .
          pip install mypy==1.15.0 lxml-stubs
      - name: mypy --strict
        run: mypy --strict src/corrigenda

  corrigenda-tests:
    # Matrix the test suite across every Python version corrigenda's
    # `requires-python` and Trove classifiers claim to support. Without
    # this, the 3.12/3.13 classifiers in pyproject.toml were unverified
    # promises and a 3.12-only regression would only surface to PyPI
    # consumers. `fail-fast: false` so a single broken version doesn't
    # mask the others' status.
    runs-on: ubuntu-latest
    # Wave-5 review — no job may idle toward the 6 h default.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/corrigenda
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install corrigenda (editable) + pytest
        # Ship pytest-asyncio so async tests in corrigenda don't quietly
        # error-out with "asyncio mode not installed"; pytest-cov gates the
        # package's own coverage (F11 repatriated the algorithm tests here).
        # hypothesis powers the property-based invariant suite (Plan V4.2).
        run: |
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov hypothesis
      - name: pytest + coverage gate (85%)
        run: pytest tests/ --cov=corrigenda --cov-report=term --cov-report=xml

  corrigenda-external-corpus:
    # Plan V4.2 phase 3 — invariants over REAL Gallica ALTO never seen
    # during development (tests/external_corpus/manifest.json). NON-
    # BLOCKING by design while it builds a track record: the fetch
    # depends on gallica.bnf.fr availability and the corpus content can
    # legitimately change under us (BnF re-OCR). Promote to blocking
    # once it has run green for a while — that promotion is a deliberate
    # one-line change (drop continue-on-error), not a default.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    defaults:
      run:
        working-directory: packages/corrigenda
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Fetch external corpus from Gallica
        run: python tests/external_corpus/fetch.py
      - name: Install corrigenda (editable) + pytest
        run: |
          pip install -e .
          pip install pytest pytest-asyncio
      - name: pytest (external corpus invariants)
        run: pytest -m external_corpus tests/test_external_corpus.py -v

  corrigenda-build:
    # Catch packaging regressions (broken classifiers, missing files in
    # the wheel/sdist) here, before they bite us at PyPI release time.
    # Matrix mirrors `corrigenda-tests` so the wheel smoke-install is
    # exercised under every supported Python — a 3.13-only metadata
    # incompatibility (eg. a hatchling plugin) would otherwise sail
    # past CI and break consumers downstream.
    runs-on: ubuntu-latest
    # Wave-5 review — no job may idle toward the 6 h default.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/corrigenda
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install build tooling
        run: pip install build
      - name: Build wheel + sdist
        run: python -m build
      - name: Verify wheel is installable + importable
        # Smoke-install the wheel into a fresh venv and exercise the
        # public API. Catches missing files in the wheel, broken
        # dependencies, or import-time errors. (We skip `twine check`
        # because it rejects PEP 639's `license-file` metadata field
        # that hatchling emits — false positive on wheel quality.)
        #
        # _smoke_imports.py is the single source of truth shared with
        # the publish workflow and scripts/release-corrigenda.sh — it
        # iterates `corrigenda.__all__` so any drift trips here. See
        # roadmap L5 / B6.
        run: |
          python -m venv /tmp/wheel-smoke
          /tmp/wheel-smoke/bin/pip install dist/*.whl
          /tmp/wheel-smoke/bin/python _smoke_imports.py
      - name: Upload distribution artifacts
        # Only one matrix leg uploads to avoid name collisions on
        # actions/upload-artifact@v4 (which errors on duplicate names).
        # The 3.11 build is the canonical release artifact — the other
        # legs only need to prove the wheel builds and imports cleanly.
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: corrigenda-dist
          path: packages/corrigenda/dist/
          if-no-files-found: error

  backend-lint:
    runs-on: ubuntu-latest
    # Wave-5 review — no job may idle toward the 6 h default.
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.15.14
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  backend-types:
    # Block on corrigenda tests: the shims forward to it, so any breakage
    # there would surface as confusing mypy errors here.
    needs: [corrigenda-tests]
    runs-on: ubuntu-latest
    # Wave-5 review — no job may idle toward the 6 h default.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install corrigenda (editable, sibling package)
        run: pip install -e packages/corrigenda
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: mypy
        working-directory: backend
        run: mypy --explicit-package-bases app

  backend-tests:
    # Block on corrigenda tests so a flaky backend run doesn't mask a
    # broken core package.
    needs: [corrigenda-tests]
    runs-on: ubuntu-latest
    # Wave-5 review — no job may idle toward the 6 h default.
    timeout-minutes: 15
    env:
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install corrigenda (editable, sibling package)
        run: pip install -e packages/corrigenda
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: pytest + coverage gate (80%)
        working-directory: backend
        # Wave 0 — the e2e scenarios run in their own backend-e2e job;
        # deselecting them here keeps the unit run fast and the coverage
        # baseline unchanged.
        run: pytest -m "not e2e" --cov=app --cov-report=term --cov-report=xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          if-no-files-found: ignore

  backend-e2e:
    # Wave 0 (docs/audit/PLAN-CORRECTIONS.md) — end-to-end gate: the REAL
    # backend under uvicorn against a local mock vendor (honest +
    # saboteur). Proves upload → pipeline → SSE → download across a
    # genuine HTTP boundary, geometry/hyphenation invariants intact, and
    # sabotaged corrections (hyphen fusion, line absorption, emptied
    # line) all intercepted → OCR fallback + completed_with_fallbacks.
    # Local mock only, no network, ~15 s. timeout-minutes: a job that
    # fails to terminate streams keepalives forever — the harness caps
    # each stream with a wall-clock deadline, and this caps the job.
    needs: [corrigenda-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install corrigenda (editable, sibling package)
        run: pip install -e packages/corrigenda
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: pytest E2E scenarios
        working-directory: backend
        run: pytest tests/e2e -q

  backend-security:
    runs-on: ubuntu-latest
    # Wave-5 review — no job may idle toward the 6 h default.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install corrigenda + backend deps + security tools
        # corrigenda lives next door; install editable so backend imports
        # resolve. Audit the resolved environment after install
        # (pip-audit -r doesn't understand editable lines).
        run: |
          pip install -e packages/corrigenda
          pip install -r backend/requirements.txt
          pip install bandit[toml]==1.9.4 pip-audit==2.10.0
      - name: bandit (static analysis)
        working-directory: backend
        run: bandit -r app -c pyproject.toml
      - name: pip-audit (dependency CVEs)
        # Audit from ``backend/requirements.txt`` rather than the
        # resolved env. The previous resolved-env approach tried to
        # audit corrigenda (editable sibling package, not on PyPI) and
        # failed in ``--strict`` mode — ``--skip-editable`` still
        # surfaces the failure as a strict-mode collection error. The
        # requirements file no longer contains editable lines (corrigenda
        # is installed separately upstream of this job), so the file-
        # based audit cleanly resolves and audits all backend deps,
        # transitive deps included, against the PyPI advisory DB.
        working-directory: backend
        run: pip-audit -r requirements.txt --strict

  frontend:
    runs-on: ubuntu-latest
    # Wave-5 review — no job may idle toward the 6 h default.
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier (check)
        run: npm run format:check
      - name: Type check
        run: npx tsc --noEmit
      - name: Tests (Vitest) + coverage gate
        # Audit-F37 — coverage is now GATED (thresholds in vitest.config.ts),
        # not merely collected. Run the coverage variant in CI.
        run: npm run test:coverage
      - name: npm audit (high+)
        # Audit-F36 — the backend runs pip-audit; the frontend had no SCA.
        # Only react/react-dom ship to the bundle (everything else is a
        # devDependency), so scope to production deps. BLOCKING: the tree
        # is clean today (0 vulnerabilities), so any future high+ finding
        # must be triaged, not scrolled past.
        # One retry: `npm audit` needs the registry's advisory endpoint,
        # and a transient outage (ENOAUDIT) must not red a code-green job.
        # A REAL vulnerability fails both attempts.
        run: npm audit --omit=dev --audit-level=high || (sleep 15 && npm audit --omit=dev --audit-level=high)
      - name: Build
        run: npm run build
      - name: Bundle size budget
        # Trips when the JS bundle > 75 KB gzipped OR CSS > 10 KB.
        # Today's baseline is ~57 KB + ~4 KB, giving ~30% headroom.
        run: npx size-limit

  frontend-api-types-drift:
    # Audit-F33 — the committed OpenAPI-generated types silently drifted
    # from the backend schema (missing completed_with_fallbacks, job_token,
    # geometric_pairing). This job regenerates them from the live FastAPI
    # spec and fails on any diff, so the committed artefact can't rot again.
    needs: [corrigenda-tests]
    runs-on: ubuntu-latest
    # Wave-5 review — no job may idle toward the 6 h default.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install corrigenda (editable, sibling package)
        run: pip install -e packages/corrigenda
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Regenerate OpenAPI types
        run: scripts/generate-frontend-api-types.sh
      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- \
            frontend/openapi.snapshot.json \
            frontend/src/types/api.generated.ts; then
            echo "::error::Generated API types are stale — run scripts/generate-frontend-api-types.sh and commit."
            exit 1
          fi

  docker-build:
    # Audit-F34 — the three container images (root HF-Spaces image,
    # backend, frontend) were NEVER built in CI: a broken COPY, an
    # unresolvable pinned digest, or a dependency conflict only surfaced
    # at HF Spaces build time (a class of failure that has shipped
    # silently once — see the root Dockerfile comment). Build all three
    # (no push), and smoke-test the root image: /health, the actual SPA
    # at /, a built asset, and /health/ready. Plain
    # `docker build`/`run` (buildx is preinstalled on ubuntu-latest) so
    # this job adds no third-party action to pin.
    runs-on: ubuntu-latest
    # Wave-5 review — no job may idle toward the 6 h default.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Build root (HF Spaces) image
        run: docker build -f Dockerfile -t corrigenda-root:ci .
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t corrigenda-backend:ci .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t corrigenda-frontend:ci ./frontend
      - name: Smoke test the root image (health + REAL frontend)
        # Plan V1.3 — /health alone CANNOT catch the wrong-COPY
        # regression: the Dockerfile documents that /health stayed 200
        # while the SPA was gone. Assert the properties that actually
        # regressed: / serves HTML with the SPA mount point, a built
        # asset referenced by that HTML responds, and /health/ready
        # (which now includes the frontend check) is green.
        run: |
          docker run -d --name corrigenda-smoke -p 7860:7860 corrigenda-root:ci
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:7860/health >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 2
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::root image did not serve /health within 60s"
            docker logs corrigenda-smoke || true
            docker rm -f corrigenda-smoke >/dev/null 2>&1 || true
            exit 1
          fi

          fail() {
            echo "::error::$1"
            docker logs corrigenda-smoke || true
            docker rm -f corrigenda-smoke >/dev/null 2>&1 || true
            exit 1
          }

          # 1. / must be the SPA: text/html AND the React mount point.
          ctype=$(curl -fsS -o /tmp/root.html -w '%{content_type}' http://127.0.0.1:7860/) \
            || fail "GET / failed"
          case "$ctype" in
            text/html*) ;;
            *) fail "GET / returned '$ctype', expected text/html — frontend not served" ;;
          esac
          grep -q '<div id="root">' /tmp/root.html \
            || fail "GET / HTML lacks the SPA mount point <div id=\"root\">"

          # 2. A built asset referenced by the HTML must respond.
          asset=$(grep -oE '/assets/[^"]+\.js' /tmp/root.html | head -1)
          [ -n "$asset" ] || fail "GET / HTML references no /assets/*.js bundle"
          curl -fsS "http://127.0.0.1:7860${asset}" >/dev/null \
            || fail "frontend asset ${asset} did not respond"

          # 3. Readiness (includes the SERVE_FRONTEND=1 frontend check).
          curl -fsS http://127.0.0.1:7860/health/ready >/dev/null \
            || fail "/health/ready is not green"

          echo "root image serves /health, the SPA at /, its assets, and /health/ready"
          docker rm -f corrigenda-smoke >/dev/null 2>&1 || true
