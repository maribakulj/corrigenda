name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal default permissions for every job. Override per-job only if a
# step needs to write (none today).
permissions:
  contents: read

jobs:
  alto-core-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/alto-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.15.14
      - name: ruff check
        run: ruff check src/
      - name: ruff format --check
        run: ruff format --check src/

  alto-core-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/alto-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install alto-core (editable) + pytest
        run: |
          pip install -e .
          pip install pytest
      - name: pytest
        run: pytest tests/

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.15.14
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  backend-types:
    # Block on alto-core tests: the shims forward to it, so any breakage
    # there would surface as confusing mypy errors here.
    needs: [alto-core-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies (pulls in editable alto-core via -e ../packages/alto-core)
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: mypy
        run: mypy --explicit-package-bases app

  backend-tests:
    # Block on alto-core tests so a flaky backend run doesn't mask a
    # broken core package.
    needs: [alto-core-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies (pulls in editable alto-core via -e ../packages/alto-core)
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: pytest + coverage gate (80%)
        run: pytest --cov=app --cov-report=term --cov-report=xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          if-no-files-found: ignore

  backend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies + security tools
        # Install backend deps first so the env reflects what we ship,
        # then audit the resolved environment (pip-audit -r doesn't
        # understand `-e` lines in requirements.txt).
        run: |
          pip install -r requirements.txt
          pip install bandit[toml]==1.9.4 pip-audit==2.10.0
      - name: bandit (static analysis)
        run: bandit -r app -c pyproject.toml
      - name: pip-audit (dependency CVEs in resolved env)
        run: pip-audit --strict

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
