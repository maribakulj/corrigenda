name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal default permissions for every job. Override per-job only if a
# step needs to write (none today).
permissions:
  contents: read

jobs:
  alto-core-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/alto-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.15.14
      - name: ruff check
        run: ruff check src/
      - name: ruff format --check
        run: ruff format --check src/

  alto-core-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/alto-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install alto-core (editable) + pytest
        # Ship pytest-asyncio so future async tests in alto-core don't
        # quietly error-out with "asyncio mode not installed".
        run: |
          pip install -e .
          pip install pytest pytest-asyncio
      - name: pytest
        run: pytest tests/

  alto-core-build:
    # Catch packaging regressions (broken classifiers, missing files in
    # the wheel/sdist) here, before they bite us at PyPI release time.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/alto-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tooling
        run: pip install build
      - name: Build wheel + sdist
        run: python -m build
      - name: Verify wheel is installable + importable
        # Smoke-install the wheel into a fresh venv and exercise the
        # public API. Catches missing files in the wheel, broken
        # dependencies, or import-time errors. (We skip `twine check`
        # because it rejects PEP 639's `license-file` metadata field
        # that hatchling emits — false positive on wheel quality.)
        run: |
          python -m venv /tmp/wheel-smoke
          /tmp/wheel-smoke/bin/pip install dist/*.whl
          /tmp/wheel-smoke/bin/python -c "
          from alto_core import (
              CorrectionPipeline, BaseProvider, PipelineObserver, OutputWriter,
              parse_alto_file, build_document_manifest, rewrite_alto_file,
              DocumentManifest, LineManifest, HyphenRole,
          )
          import alto_core
          print(f'alto-core {alto_core.__version__} wheel installed + importable')
          "
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alto-core-dist
          path: packages/alto-core/dist/
          if-no-files-found: error

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.15.14
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  backend-types:
    # Block on alto-core tests: the shims forward to it, so any breakage
    # there would surface as confusing mypy errors here.
    needs: [alto-core-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install alto-core (editable, sibling package)
        run: pip install -e packages/alto-core
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: mypy
        working-directory: backend
        run: mypy --explicit-package-bases app

  backend-tests:
    # Block on alto-core tests so a flaky backend run doesn't mask a
    # broken core package.
    needs: [alto-core-tests]
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install alto-core (editable, sibling package)
        run: pip install -e packages/alto-core
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: pytest + coverage gate (80%)
        working-directory: backend
        run: pytest --cov=app --cov-report=term --cov-report=xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          if-no-files-found: ignore

  backend-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install alto-core + backend deps + security tools
        # alto-core lives next door; install editable so backend imports
        # resolve. Audit the resolved environment after install
        # (pip-audit -r doesn't understand editable lines).
        run: |
          pip install -e packages/alto-core
          pip install -r backend/requirements.txt
          pip install bandit[toml]==1.9.4 pip-audit==2.10.0
      - name: bandit (static analysis)
        working-directory: backend
        run: bandit -r app -c pyproject.toml
      - name: pip-audit (dependency CVEs in resolved env)
        run: pip-audit --strict

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier (check)
        run: npm run format:check
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
