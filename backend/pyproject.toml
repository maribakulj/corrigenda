# ---------------------------------------------------------------------------
# Tooling configuration for the backend package.
#
# Quality gates (Phase 1.1 of MIGRATION.md):
#   - ruff check + ruff format (lint + format)
#   - mypy (type check, currently lenient; will tighten as code is typed)
#   - pytest + coverage (gate at 80%)
#
# This file is intentionally NOT a build config yet — the backend is still
# imported as a flat `app` package via PYTHONPATH=. for the time being.
# It will become a proper hatchling-built package in Phase 2.
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["build", "dist", ".venv", "venv"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]
ignore = [
    "E501",   # line-too-long — formatter handles wrapping; long literals are fine
    "B008",   # function calls in default args (common FastAPI Depends pattern)
    "SIM117", # nested with statements — sometimes clearer than combined
    "RUF059", # unused-unpacked-variable — `for k, _ in items.items()` is idiomatic
    "UP042",  # replace-str-enum — `class X(str, Enum)` is fine; StrEnum changes serialisation
    "RUF002", # ambiguous-unicode-character-docstring — false positives on French
    "RUF003", # ambiguous-unicode-character-comment — idem
    "B905",   # zip-without-explicit-strict — adds noise without catching real bugs here
    "E402",   # module-import-not-at-top — used intentionally for late imports
    "SIM105", # suppressible-exception — `try/except: pass` is sometimes clearer
    # Stylistic checks deferred to a future tightening pass — keeping the
    # baseline green so CI can fail on real regressions today.
    "SIM102", # collapsible-if
    "SIM103", # needless-bool
    "SIM108", # if-else-block-instead-of-if-exp
    "SIM113", # enumerate-for-loop
    "C416",   # unnecessary-comprehension
    "RUF007", # zip-instead-of-pairwise
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "B011",   # assert False — legit in tests
    "SIM",    # over-zealous in test fixtures
    "E741",   # `l` as a loop variable is fine in compact test code
    "C416",   # `[x for x in xs]` is sometimes clearer than `list(xs)` in tests
    "F841",   # locals kept for readability mid-test
    "RUF043", # explicit match strings in pytest.raises are fine
    "RUF015", # `next(iter(xs))` vs `xs[0]` is style
]
"app/providers/__init__.py" = ["F401"]  # re-exports
"app/protocols/__init__.py" = ["F401"]  # re-exports

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ---------------------------------------------------------------------------
# mypy — start lenient, tighten module-by-module as we annotate
# ---------------------------------------------------------------------------

[tool.mypy]
python_version = "3.11"
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = false
no_implicit_optional = true
check_untyped_defs = false
ignore_missing_imports = true
# `app.alto`, `app.jobs.chunk_planner/validator/line_acceptance/correction_pipeline`,
# `app.protocols`, and `app.schemas` are re-export shims forwarding to
# alto-core. mypy needs implicit_reexport=true to chase `from X import *`
# through them without requiring an `__all__` in the alto-core modules.
implicit_reexport = true
# Pure-domain modules now live in alto-core; the shims point there.
[[tool.mypy.overrides]]
module = [
    "app.jobs.runner",
    "app.storage.output_writer",
]
disallow_untyped_defs = true  # these two modules are fully annotated; keep them so
warn_return_any = true

# Tests don't need strict typing
[[tool.mypy.overrides]]
module = ["tests.*"]
ignore_errors = true

# ---------------------------------------------------------------------------
# pytest
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
# Add the backend directory (pytest's auto-detected rootdir = parent of
# this file) to sys.path so test imports like ``from app.schemas import …``
# resolve regardless of how pytest is invoked. Without this, bare
# ``pytest`` from this directory fails: Python 3.11+ no longer adds cwd
# to sys.path automatically, and the CI's ``env: PYTHONPATH: backend``
# is resolved relative to the step's cwd (already ``backend/``) so it
# points at a non-existent ``backend/backend``. ``python -m pytest``
# happens to work because the ``-m`` form does add cwd, but the
# pyproject setting makes the import contract independent of the
# invocation form (PR #45 introduced bare ``pytest`` in CI and broke
# the backend-tests job; this restores it).
pythonpath = ["."]
# Surface DeprecationWarnings so upstream API changes (alto-core, FastAPI,
# Pydantic, ...) reach us early instead of breaking suddenly. Switch to
# "error" once the baseline is clean.

# ---------------------------------------------------------------------------
# coverage
# ---------------------------------------------------------------------------

[tool.coverage.run]
# Measure only app.* (HTTP + adapters living in backend). The pure
# pipeline (alto_core.*) carries its own tests and coverage gate in
# packages/alto-core (F11 — the algorithm tests were repatriated there),
# so measuring it from the backend run would undercount it now that those
# tests no longer live here.
source = ["app"]
branch = true
omit = [
    "tests/*",
    "*/__init__.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]

# ---------------------------------------------------------------------------
# bandit — security static analysis
# ---------------------------------------------------------------------------

[tool.bandit]
exclude_dirs = ["tests", "build", "dist", ".venv", "venv"]
# Skipped checks (with justification):
#   B101  asserts used as guards for mypy after FastAPI Depends — invariant
#         is enforced by the dependency, the assert is documentation that
#         happens to type-narrow; we never rely on it for security.
#   B108  /tmp/app-jobs is the documented default for HF Spaces; the path
#         is configurable via $JOB_STORAGE_DIR and each job gets its own
#         subdir, so directory-traversal risk is bounded.
#   B110  try/except: pass in best-effort cleanup paths (subscriber queue
#         eviction, dirent stat) — failures here are non-fatal by design.
skips = ["B101", "B108", "B110"]
