[project]
name = "corrigenda"
# Single source of truth for the version: src/corrigenda/__init__.py
# `__version__`. Bump it there + add a CHANGELOG.md entry to release.
dynamic = ["version"]
description = "Structure-safe post-OCR correction of heritage transcriptions (ALTO, PAGE XML) — parsers, rewriters, hyphenation reconciler, span edit protocol."
readme = "README.md"
# License declared via classifier only — both `license = "Apache-2.0"`
# (PEP 639 string) and `license = {file = "..."}` (dict form) produce
# Metadata 2.4 fields (`license-expression`, `license-file`) that
# twine < 7 rejects. Once twine 7+ is widely deployed, switch back to
# `license = "Apache-2.0"`. LICENSE file is still in the sdist via
# the hatch.build.targets.sdist include below.
requires-python = ">=3.11"
authors = [
    { name = "corrigenda contributors" },
]
keywords = ["alto", "page-xml", "ocr", "xml", "llm", "digital-heritage", "transkribus", "escriptorium"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Text Processing :: Markup :: XML",
]
dependencies = [
    "pydantic>=2.0,<3.0",
    "lxml>=6.1,<7.0",
]

[project.optional-dependencies]
# QE scorer (ROADMAP V3 Phase 3): the zero-shot D'AlemBERT pseudo-perplexity
# scorer behind core.quality.QEScorer. RUNTIME is onnxruntime + tokenizers
# only — NO torch, NO transformers (the heavy conversion lives in the
# dev-time scripts/export_masked_lm_onnx.py, never on the install path).
qe = [
    "onnxruntime>=1.17,<2.0",
    "tokenizers>=0.15,<1.0",
    "numpy>=1.24,<3.0",
]

# Vision chain (ROADMAP V3 Phase 4): the corrigenda[vision] producer decodes,
# validates and crops page images and calls a multimodal provider. Pillow is
# the ONLY image dependency and it is imported LAZILY, inside
# integrations/vision.py — never at module import and never on the base
# install path (enforced by the I4 static scan + the runtime import contract
# in tests/test_import_contract.py). The pixel-blind correction engine never
# pulls it. Keep this the single image dep: heavier stacks (cv2, torch) stay
# out by construction (I4 blocklist).
vision = [
    "pillow>=10.0,<12.0",
]

[project.urls]
Homepage = "https://github.com/maribakulj/corrigenda"
Issues = "https://github.com/maribakulj/corrigenda/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
# Read __version__ from the package — keeps pyproject.toml and the
# importable `corrigenda.__version__` in lockstep.
path = "src/corrigenda/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/corrigenda"]

[tool.hatch.build.targets.sdist]
include = [
    "src/corrigenda",
    "README.md",
    "CHANGELOG.md",
    "LICENSE",
]

# ---------------------------------------------------------------------------
# ruff — CI lints src/ only; this config keeps `ruff check tests/` and the
# pre-commit hook (which covers packages/corrigenda/) clean too. The test
# ignores mirror the backend's: compact test code uses `l` loop vars, keeps
# locals for readability, and imports late in a few end-to-end cases.
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["E402", "E741", "F841"]

# ---------------------------------------------------------------------------
# pytest — the external_corpus marker gates tests that need the fetched
# Gallica corpus (V4.2 phase 3): they self-skip when the corpus cache is
# absent, and only the dedicated non-blocking CI job fetches it.
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
markers = [
    "external_corpus: needs the fetched external ALTO corpus (tests/external_corpus/fetch.py)",
]

# ---------------------------------------------------------------------------
# coverage — the package now carries the algorithm tests (F11) and gates its
# own coverage (~85% DoD; currently ~91%). The `corrigenda-tests` CI job runs
# pytest with --cov=corrigenda.
# ---------------------------------------------------------------------------
[tool.coverage.run]
source = ["corrigenda"]
branch = true
# integrations/qe.py is the corrigenda[qe] extra: it only runs with
# onnxruntime + the exported D'AlemBERT bundle present, which the default
# CI test job cannot provide (heavy deps + a 545 MB model). It has its own
# suite (tests/test_qe_dalembert.py) that self-skips when the extra/bundle
# is absent, so gating the core coverage on it would falsely read 0%.
# integrations/vision.py is the corrigenda[vision] extra (Pillow), same deal:
# its suite self-skips without the extra, so it is omitted from the core gate.
omit = ["*/__init__.py", "*/integrations/qe.py", "*/integrations/vision.py"]

[tool.coverage.report]
fail_under = 85
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]

# ---------------------------------------------------------------------------
# mypy — the package ships `py.typed` (PEP 561) and is checked in --strict
# mode (F12 / §8.3). The `corrigenda-types` CI job runs
# `mypy --strict src/corrigenda` with lxml-stubs installed.
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.11"
strict = true
files = ["src/corrigenda"]

[[tool.mypy.overrides]]
# lxml ships partial stubs (lxml-stubs); a few dynamic corners remain
# untyped. We install lxml-stubs in CI; this keeps the odd residual
# module import from failing strict mode.
module = ["lxml.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# The corrigenda[qe] runtime deps are lazy-imported inside
# integrations/qe.py and absent from the mypy CI env (it installs only the
# package + lxml-stubs). Treat them as untyped so --strict still runs.
module = ["onnxruntime.*", "tokenizers.*", "numpy.*"]
ignore_missing_imports = true
