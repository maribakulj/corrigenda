[project]
name = "alto-core"
version = "0.1.0a1"
description = "Pure ALTO XML correction pipeline core — parser, rewriter, hyphenation reconciler, chunk planner."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "alto-llm-corrector contributors" },
]
keywords = ["alto", "ocr", "xml", "llm", "digital-heritage"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Text Processing :: Markup :: XML",
]
dependencies = [
    "pydantic>=2.0,<3.0",
    "lxml>=6.1,<7.0",
]

[project.urls]
Homepage = "https://github.com/maribakulj/alto-llm-corrector"
Issues = "https://github.com/maribakulj/alto-llm-corrector/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alto_core"]

[tool.hatch.build.targets.sdist]
include = [
    "src/alto_core",
    "README.md",
    "LICENSE",
]
