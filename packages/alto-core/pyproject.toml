[project]
name = "alto-core"
# Single source of truth for the version: src/alto_core/__init__.py
# `__version__`. Bump it there + add a CHANGELOG.md entry to release.
dynamic = ["version"]
description = "Pure ALTO XML correction pipeline core — parser, rewriter, hyphenation reconciler, chunk planner."
readme = "README.md"
# License declared via classifier only — both `license = "Apache-2.0"`
# (PEP 639 string) and `license = {file = "..."}` (dict form) produce
# Metadata 2.4 fields (`license-expression`, `license-file`) that
# twine < 7 rejects. Once twine 7+ is widely deployed, switch back to
# `license = "Apache-2.0"`. LICENSE file is still in the sdist via
# the hatch.build.targets.sdist include below.
requires-python = ">=3.11"
authors = [
    { name = "alto-llm-corrector contributors" },
]
keywords = ["alto", "ocr", "xml", "llm", "digital-heritage"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Text Processing :: Markup :: XML",
]
dependencies = [
    "pydantic>=2.0,<3.0",
    "lxml>=6.1,<7.0",
]

[project.urls]
Homepage = "https://github.com/maribakulj/alto-llm-corrector"
Issues = "https://github.com/maribakulj/alto-llm-corrector/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
# Read __version__ from the package — keeps pyproject.toml and the
# importable `alto_core.__version__` in lockstep.
path = "src/alto_core/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/alto_core"]

[tool.hatch.build.targets.sdist]
include = [
    "src/alto_core",
    "README.md",
    "CHANGELOG.md",
    "LICENSE",
]
