[project]
name = "alto-core"
# Single source of truth for the version: src/alto_core/__init__.py
# `__version__`. Bump it there + add a CHANGELOG.md entry to release.
dynamic = ["version"]
description = "Pure ALTO XML correction pipeline core — parser, rewriter, hyphenation reconciler, chunk planner."
readme = "README.md"
# License declared via classifier only — both `license = "Apache-2.0"`
# (PEP 639 string) and `license = {file = "..."}` (dict form) produce
# Metadata 2.4 fields (`license-expression`, `license-file`) that
# twine < 7 rejects. Once twine 7+ is widely deployed, switch back to
# `license = "Apache-2.0"`. LICENSE file is still in the sdist via
# the hatch.build.targets.sdist include below.
requires-python = ">=3.11"
authors = [
    { name = "alto-llm-corrector contributors" },
]
keywords = ["alto", "ocr", "xml", "llm", "digital-heritage"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Text Processing :: Markup :: XML",
]
dependencies = [
    "pydantic>=2.0,<3.0",
    "lxml>=6.1,<7.0",
]

[project.urls]
Homepage = "https://github.com/maribakulj/alto-llm-corrector"
Issues = "https://github.com/maribakulj/alto-llm-corrector/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
# Read __version__ from the package — keeps pyproject.toml and the
# importable `alto_core.__version__` in lockstep.
path = "src/alto_core/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/alto_core"]

[tool.hatch.build.targets.sdist]
include = [
    "src/alto_core",
    "README.md",
    "CHANGELOG.md",
    "LICENSE",
]

# ---------------------------------------------------------------------------
# ruff — CI lints src/ only; this config keeps `ruff check tests/` and the
# pre-commit hook (which covers packages/alto-core/) clean too. The test
# ignores mirror the backend's: compact test code uses `l` loop vars, keeps
# locals for readability, and imports late in a few end-to-end cases.
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["E402", "E741", "F841"]

# ---------------------------------------------------------------------------
# coverage — the package now carries the algorithm tests (F11) and gates its
# own coverage (~85% DoD; currently ~91%). The `alto-core-tests` CI job runs
# pytest with --cov=alto_core.
# ---------------------------------------------------------------------------
[tool.coverage.run]
source = ["alto_core"]
branch = true
omit = ["*/__init__.py"]

[tool.coverage.report]
fail_under = 85
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]

# ---------------------------------------------------------------------------
# mypy — the package ships `py.typed` (PEP 561) and is checked in --strict
# mode (F12 / §8.3). The `alto-core-types` CI job runs
# `mypy --strict src/alto_core` with lxml-stubs installed.
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.11"
strict = true
files = ["src/alto_core"]

[[tool.mypy.overrides]]
# lxml ships partial stubs (lxml-stubs); a few dynamic corners remain
# untyped. We install lxml-stubs in CI; this keeps the odd residual
# module import from failing strict mode.
module = ["lxml.*"]
ignore_missing_imports = true
