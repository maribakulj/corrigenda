# Pre-commit hooks for alto-llm-corrector.
# Install with: pre-commit install
#
# All hooks run on changed files only — fast enough to run on every commit.
# CI re-runs the full suite on every push.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
        # Non-regression corpora are deliberately large (word-level
        # polygons on full newspaper pages): examples/page/newseye-fr/*.xml
        # is ~2.4 MB per page. Everything else keeps the 1 MB guard.
        exclude: ^examples/page/newseye-fr/.*\.xml$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      # Run on both backend/ and packages/corrigenda/ so local commits
      # surface corrigenda lint issues before CI does.
      - id: ruff-check
        args: [--fix]
        files: ^(backend|packages/corrigenda)/
      - id: ruff-format
        files: ^(backend|packages/corrigenda)/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        files: ^backend/app/
        # NOTE: this hook runs in an isolated sandbox and cannot reach
        # the in-tree corrigenda sibling package, so it ignores
        # `from corrigenda.X import Y` imports (via mypy's
        # `ignore_missing_imports = true` in pyproject.toml). CI's
        # `backend-types` job installs corrigenda editable and catches
        # those imports for real. Run that job locally with:
        #   pip install -e packages/corrigenda
        #   cd backend && mypy --explicit-package-bases app
        args: [--config-file=backend/pyproject.toml, --explicit-package-bases]
        additional_dependencies:
          - pydantic>=2.0
          - lxml>=6.1
          - httpx>=0.27
          - fastapi>=0.115

  # Frontend formatter — runs on the .ts/.tsx/.json/.css/.md tracked
  # by the frontend's .prettierrc. ESLint is run only in CI (its
  # plugin set is heavy and the local feedback loop via the IDE is
  # already there for most contributors).
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/src/.*\.(ts|tsx|json|css|md)$
        additional_dependencies:
          - prettier@3.8.3
