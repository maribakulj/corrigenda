server {
  listen 80;

  # Security headers — applied to every response.
  # `always` ensures they're sent even on 4xx/5xx errors.
  # Note: nginx does NOT inherit server-level add_header into a location
  # that defines its own add_header. Keep this in mind if locations grow.
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
  # 'unsafe-inline' on style-src is required for React's style={{...}} inline
  # attributes (LayoutViewer uses them). script-src stays strict.
  # img-src allows data: for inline SVG and blob: for any client-side previews.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    proxy_cache off;
    # SSE support
    proxy_read_timeout 3600s;
    proxy_http_version 1.1;
    chunked_transfer_encoding on;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
