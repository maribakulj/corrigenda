services:
  backend:
    build:
      # Build context is the repo root so the Dockerfile can reach the
      # sibling packages/corrigenda directory.
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - /tmp/app-jobs:/tmp/app-jobs

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
